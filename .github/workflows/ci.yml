name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout ce-storage
        uses: actions/checkout@v4
        with:
          path: ce-storage

      # Path dependency: ce-storage depends on ../ce-rs
      - name: Checkout ce-rs
        uses: actions/checkout@v4
        with:
          repository: ce-net/ce-rs
          path: ce-rs

      # Path dependency: ce-cap + ce-identity live inside ce-net/ce (../ce/crates/*)
      - name: Checkout ce
        uses: actions/checkout@v4
        with:
          repository: ce-net/ce
          path: ce

      # Path dependency: ce-iam-core lives inside ce-net/ce-iam (../ce-iam/crates/ce-iam-core)
      - name: Checkout ce-iam
        uses: actions/checkout@v4
        with:
          repository: ce-net/ce-iam
          path: ce-iam

      # Transitive path dependency: ce-iam-core depends on ce-secrets-rs (../ce-secrets-rs)
      - name: Checkout ce-secrets-rs
        uses: actions/checkout@v4
        with:
          repository: ce-net/ce-secrets-rs
          path: ce-secrets-rs

      # Optional path dependency ce-pin (../ce-pin) — cargo reads its manifest during dependency
      # resolution even when the optional feature is off, so it must be present.
      - name: Checkout ce-pin
        uses: actions/checkout@v4
        with:
          repository: ce-net/ce-pin
          path: ce-pin

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ce-storage

      - name: Build
        working-directory: ce-storage
        run: cargo build --all --verbose

      - name: Test
        working-directory: ce-storage
        run: cargo test --all --verbose
