# ce-storage — an S3/GCS-compatible object store over CE's content-addressed blobs,
# installed through the one `ce` binary. `ce app install ce-storage`, then use the
# S3-subset CLI (buckets/objects) or run `ce-storage gateway` for an S3 HTTP endpoint.

[app]
name    = "ce-storage"
version = "0.1.0"
summary = "S3/GCS-compatible object store over CE content-addressed blobs"
runtime = "native"
publisher = "c0be11e0ce0aaa769da6f9970244947d3d32a0c0d8302fb5f41f73d7950be456"

[build]
features = ["gateway"]

[native]
bin = "ce-storage"
[native.artifacts]
"darwin-amd64" = "9a3f7669daaefcd30602d738fc91800dedf56ef4ebc487872bab09bec18eaa05"
"linux-amd64"  = "f650051bc398c825985d022935d900cfe69a75a43cbfce7da6a09d6b284b1f09"

[deps]
# Stores object bytes in the local node's content-addressed /blobs; presigned-equivalent
# access links are ce-cap capabilities. The bucket index is a local JSON file.

[sandbox]
# A host CLI/gateway: it reads/writes a local index file and talks to the local node over
# loopback (and, in `gateway` mode, binds a local S3 port). Not a gVisor container.
tier       = "none"
net        = "loopback"
capability = "inherit"

[daemon]
enabled = true
args    = ["gateway", "--bind", "127.0.0.1:9000"]
restart = "on-failure"
